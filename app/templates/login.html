<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ t('login_title') }}</title>
  <style>
    :root {
      --bg: #f4efe5;
      --panel: rgba(255, 255, 255, .9);
      --line: rgba(24, 32, 43, .12);
      --text: #18202b;
      --muted: #617082;
      --accent: #1d4ed8;
      --shadow: 0 18px 45px rgba(15, 23, 42, .12);
    }
  
    * {
      box-sizing: border-box
    }
  
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(29, 78, 216, .16), transparent 28%),
        linear-gradient(180deg, var(--bg), #f8fafc);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px
    }
  
    .card {
      width: min(480px, 100%);
      padding: 28px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px)
    }
  
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }
  
    h1 {
      margin: 0 0 8px;
      font-size: 28px
    }
  
    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5
    }
  
    .lang-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end
    }
  
    .lang-links a {
      padding: 8px 12px;
      border-radius: 999px;
      background: #e0ecff;
      color: #0f172a;
      text-decoration: none;
      font-weight: 700
    }
  
    .lang-links a.active {
      background: #1d4ed8;
      color: #fff
    }
  
    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700
    }
  
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-size: 14px
    }
  
    input:focus {
      outline: none;
      border-color: rgba(29, 78, 216, .5);
      box-shadow: 0 0 0 4px rgba(29, 78, 216, .12)
    }
  
    .btn {
      width: 100%;
      margin-top: 18px;
      padding: 12px 16px;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #fff;
      border: 0;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer
    }
  
    .error {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(185, 28, 28, .08);
      color: #991b1b
    }
  
    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted)
    }
  </style>
</head>
<body lang="{{ lang }}">
  <div class="card">
    <div class="header">
      <div>
        <h1>{{ t('login_title') }}</h1>
        <p>{{ t('login_prompt') }}</p>
      </div>
      <div class="lang-links">
        <a href="/lang/zh?next=/login" {% if lang=='zh' %}class="active" {% endif %}>中文</a>
        <a href="/lang/en?next=/login" {% if lang=='en' %}class="active" {% endif %}>English</a>
      </div>
    </div>
    <form method="post" action="/login">
      <label>{{ t('login_username') }}</label>
      <input name="username" placeholder="{{ t('login_username') }}" required />
      <label>{{ t('login_password') }}</label>
      <input type="password" name="password" placeholder="{{ t('login_password') }}" required />
      <button class="btn" type="submit">{{ t('login_button') }}</button>
    </form>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <div class="hint">{{ t('login_hint') }}</div>
  </div>
</body>
</html>
