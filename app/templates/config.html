{% extends "base.html" %}
{% block content %}
<div class="box">
  <h2>Configuration</h2>
  {% if message %}<p style="color:#2e7d32">{{ message }}</p>{% endif %}
  <form method="post" action="/config">
    <h3>GitHub</h3>
    <label>Tokens (comma separated)</label><input name="github_tokens" value="{{ cfg.github.tokens | join(',') }}" />
    <label>User-Agent</label><input name="github_user_agent" value="{{ cfg.github.user_agent }}" />
    <label>Request timeout seconds</label><input name="github_timeout" value="{{ cfg.github.request_timeout_seconds }}" />
    <label>Max pages</label><input name="github_max_pages" value="{{ cfg.github.max_pages }}" />
    <label>Page delay seconds</label><input name="github_page_delay" value="{{ cfg.github.page_delay_seconds }}" />

    <h3>Scanner</h3>
    <label>Scan interval seconds</label><input name="scanner_interval" value="{{ cfg.scanner.interval_seconds }}" />
    <label>Search workers</label><input name="search_workers" value="{{ cfg.scanner.search_workers }}" />
    <label>Validation workers</label><input name="validate_workers" value="{{ cfg.scanner.validate_workers }}" />

    <h3>Validation</h3>
    <label>Validation timeout seconds</label><input name="validation_timeout" value="{{ cfg.validation.request_timeout_seconds }}" />
    <label>Retry count</label><input name="validation_retries" value="{{ cfg.validation.retries }}" />
    <label>Initial backoff seconds</label><input name="validation_backoff" value="{{ cfg.validation.initial_backoff_seconds }}" />

    <h3>Web</h3>
    <label>Host</label><input name="web_host" value="{{ cfg.web.host }}" />
    <label>Port</label><input name="web_port" value="{{ cfg.web.port }}" />
    <label>Username</label><input name="web_username" value="{{ cfg.web.username }}" />
    <label>New password (leave empty to keep current)</label><input type="password" name="web_password" value="" />
    <label>Session secret</label><input name="web_session_secret" value="{{ cfg.web.session_secret }}" />
    <label>Page size</label><input name="web_page_size" value="{{ cfg.web.page_size }}" />

    <h3>API</h3>
    <label><input type="checkbox" name="api_enabled" {% if cfg.api.enabled %}checked{% endif %} /> Enable API</label>
    <label>API token</label><input name="api_token" value="{{ cfg.api.token }}" />

    <h3>Channels JSON</h3>
    <p class="muted">Supports custom channels, per-channel proxy (proxy), and custom query expressions (query).</p>
    <textarea name="channels_json" rows="18">{{ channels_json }}</textarea>

    <p><button class="btn" type="submit">Save configuration</button></p>
  </form>
</div>
{% endblock %}
