[mypy]
python_version = 3.12
strict = True

[mypy-yaml]
ignore_missing_imports = True

[mypy-fastapi]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-starlette.*]
ignore_missing_imports = True

[mypy-uvicorn]
ignore_missing_imports = True

[mypy-app.web]
disallow_untyped_decorators = False
