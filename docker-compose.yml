services:
  app:
    image: ghcr.io/html5syt/gen-ai-api-key-hunt:latest
    pull_policy: always
    ports:
      - "8080:8080"
    volumes:
      - type: bind
        source: ./config.yaml
        target: /app/config.yaml
        bind:
          create_host_path: false
      - type: bind
        source: ./data
        target: /app/data
        bind:
          create_host_path: true
    restart: unless-stopped
